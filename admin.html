<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Mega Quiz Challenge</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            text-align: center;
        }

        .header h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 16px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            text-align: center;
        }

        .stat-value {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #666;
            font-size: 14px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-export {
            background: #2ecc71;
            color: white;
        }

        .btn-export:hover {
            background: #27ae60;
            transform: translateY(-2px);
        }

        .btn-clear {
            background: #e74c3c;
            color: white;
        }

        .btn-clear:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }

        .btn-home {
            background: #3498db;
            color: white;
        }

        .btn-home:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }

        .table-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #667eea;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: bold;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .status-winner {
            background: #d4edda;
            color: #155724;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
        }

        .status-eliminated {
            background: #f8d7da;
            color: #721c24;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
        }

        .status-rejected {
            background: #f5c6cb;
            color: #721c24;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
        }

        .score {
            font-weight: bold;
            font-size: 16px;
            color: #667eea;
        }

        .expand-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .expand-btn:hover {
            background: #5568d3;
            transform: scale(1.05);
        }

        .details {
            display: none;
        }

        .details.show {
            display: table-row;
        }

        .details-content {
            padding: 20px;
            background: #f8f9fa;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .detail-item {
            background: white;
            padding: 12px;
            border-radius: 6px;
            border-left: 4px solid #667eea;
        }

        .detail-label {
            font-weight: bold;
            color: #667eea;
            font-size: 12px;
            text-transform: uppercase;
        }

        .detail-value {
            color: #333;
            margin-top: 5px;
            font-size: 14px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: white;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            table {
                font-size: 12px;
            }

            th, td {
                padding: 8px;
            }

            .header h1 {
                font-size: 24px;
            }

            .stats {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🎯 Admin Dashboard</h1>
        <p>Mega Quiz Challenge - All User Responses</p>
    </div>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-value" id="totalUsers">0</div>
            <div class="stat-label">Total Users</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="totalWinners">0</div>
            <div class="stat-label">Winners 🏆</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="totalEliminated">0</div>
            <div class="stat-label">Eliminated</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="avgScore">0</div>
            <div class="stat-label">Average Score</div>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-export" onclick="exportToCSV()">📥 Export as CSV</button>
        <button class="btn btn-export" onclick="exportToJSON()">💾 Export as JSON</button>
        <button class="btn btn-clear" onclick="clearAllData()">🗑️ Clear All Data</button>
        <button class="btn btn-home" onclick="goHome()">🏠 Back to Quiz</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Score</th>
                    <th>Status</th>
                    <th>Timestamp</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Data will be populated here -->
            </tbody>
        </table>
        <div id="emptyState" class="empty-state">
            <div class="empty-state-icon">📊</div>
            <p>No user data yet. Start the quiz to see responses here!</p>
        </div>
    </div>

    <div class="footer">
        <p>© 2026 Mega Quiz Challenge | Secure Admin Panel</p>
    </div>
</div>

<script>
    function loadData() {
        const allUsers = JSON.parse(localStorage.getItem('quizDatabase')) || [];
        const tableBody = document.getElementById('tableBody');
        const emptyState = document.getElementById('emptyState');
        
        if (allUsers.length === 0) {
            emptyState.style.display = 'block';
            return;
        }

        emptyState.style.display = 'none';
        tableBody.innerHTML = '';

        allUsers.forEach((user, index) => {
            const mainRow = document.createElement('tr');
            mainRow.innerHTML = `
                <td><strong>${user.username}</strong></td>
                <td><span class="score">${user.finalScore || 'N/A'}/25</span></td>
                <td>
                    ${user.status === 'WINNER 🏆' ? 
                        '<span class="status-winner">WINNER 🏆</span>' : 
                        user.status === 'REJECTED IN ROUND 2' ?
                        '<span class="status-rejected">REJECTED R2</span>' :
                        '<span class="status-eliminated">ELIMINATED</span>'
                    }
                </td>
                <td>${user.timestamp}</td>
                <td><button class="expand-btn" onclick="toggleDetails(${index})">View Details</button></td>
            `;
            tableBody.appendChild(mainRow);

            const detailsRow = document.createElement('tr');
            detailsRow.className = `details` ;
            detailsRow.id = `details-${index}`;
            detailsRow.innerHTML = `
                <td colspan="5">
                    <div class="details-content">
                        <h3 style="color: #667eea; margin-bottom: 15px;">📋 Complete Response for ${user.username}</h3>
                        <div class="detail-grid">
                            <div class="detail-item">
                                <div class="detail-label">Round 1 - Q1 (Food)</div>
                                <div class="detail-value">${user.q1 || 'Not answered'}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Round 1 - Q2 (Color)</div>
                                <div class="detail-value">${user.q2 || 'Not answered'}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Round 1 - Q3 (Singer)</div>
                                <div class="detail-value">${user.q3 || 'Not answered'}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Round 1 - Q4 (Chocolate)</div>
                                <div class="detail-value">${user.q4 || 'Not answered'}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Round 1 - Q5 (Drink)</div>
                                <div class="detail-value">${user.q5 || 'Not answered'}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Round 1 - Q6 (Food)</div>
                                <div class="detail-value">${user.q6 || 'Not answered'}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Round 2 - BF Answer</div>
                                <div class="detail-value">${(user.bf || 'Not answered').toUpperCase()}</div>
                            </div>
                            ${user.bf === 'no' ? `
                                <div class="detail-item">
                                    <div class="detail-label">Round 3 - Q1 (Impact) - Option ${user.f1}</div>
                                    <div class="detail-value">${getPointsLabel('f1', user.f1)}</div>
                                </div>
                                <div class="detail-item">
                                    <div class="detail-label">Round 3 - Q2 (Path) - Option ${user.f2}</div>
                                    <div class="detail-value">${getPointsLabel('f2', user.f2)}</div>
                                </div>
                                <div class="detail-item">
                                    <div class="detail-label">Round 3 - Q3 (Recovery) - Option ${user.f3}</div>
                                    <div class="detail-value">${getPointsLabel('f3', user.f3)}</div>
                                </div>
                                <div class="detail-item">
                                    <div class="detail-label">Round 3 - Q4 (Identity) - Option ${user.f4}</div>
                                    <div class="detail-value">${getPointsLabel('f4', user.f4)}</div>
                                </div>
                                <div class="detail-item" style="border-left-color: #2ecc71;">
                                    <div class="detail-label">🏆 Final Score</div>
                                    <div class="detail-value" style="font-size: 18px; color: #2ecc71; font-weight: bold;">${user.finalScore}/25 - ${user.status}</div>
                                </div>
                            ` : `
                                <div class="detail-item" style="border-left-color: #e74c3c;">
                                    <div class="detail-label">❌ Status</div>
                                    <div class="detail-value" style="font-size: 16px; color: #e74c3c; font-weight: bold;">${user.status}</div>
                                </div>
                            `}
                        </div>
                    </div>
                </td>
            `;
            tableBody.appendChild(detailsRow);
        });

        updateStats(allUsers);
    }

    function getPointsLabel(question, option) {
        const pointsMap = {
            f1: { a: '+5 Points', b: '+1 Point' },
            f2: { a: '+5 Points', b: '+0 Points' },
            f3: { a: '-10 Points', b: '+10 Points' },
            f4: { a: '+2 Points', b: '+5 Points' }
        };
        return pointsMap[question][option] || 'N/A';
    }

    function toggleDetails(index) {
        const detailsRow = document.getElementById(`details-${index}`);
        detailsRow.classList.toggle('show');
    }

    function updateStats(users) {
        const totalUsers = users.length;
        const winners = users.filter(u => u.status === 'WINNER 🏆').length;
        const eliminated = users.filter(u => u.status !== 'WINNER 🏆').length;
        const avgScore = users.length > 0 ? 
            Math.round(users.reduce((sum, u) => sum + (u.finalScore || 0), 0) / users.length) : 0;

        document.getElementById('totalUsers').textContent = totalUsers;
        document.getElementById('totalWinners').textContent = winners;
        document.getElementById('totalEliminated').textContent = eliminated;
        document.getElementById('avgScore').textContent = avgScore;
    }

    function exportToCSV() {
        const users = JSON.parse(localStorage.getItem('quizDatabase')) || [];
        let csv = 'Username,Score,Status,Timestamp,Q1,Q2,Q3,Q4,Q5,Q6,BF,F1,F2,F3,F4\n';
        
        users.forEach(user => {
            csv += `"${user.username}","${user.finalScore || 'N/A'}","${user.status}","${user.timestamp}","${user.q1 || ''}","${user.q2 || ''}","${user.q3 || ''}","${user.q4 || ''}","${user.q5 || ''}","${user.q6 || ''}","${user.bf || ''}","${user.f1 || ''}","${user.f2 || ''}","${user.f3 || ''}","${user.f4 || ''}"\n`;
        });

        downloadFile(csv, 'quiz_responses.csv', 'text/csv');
    }

    function exportToJSON() {
        const users = JSON.parse(localStorage.getItem('quizDatabase')) || [];
        const json = JSON.stringify(users, null, 2);
        downloadFile(json, 'quiz_responses.json', 'application/json');
    }

    function downloadFile(content, filename, type) {
        const element = document.createElement('a');
        element.setAttribute('href', 'data:' + type + ';charset=utf-8,' + encodeURIComponent(content));
        element.setAttribute('download', filename);
        element.style.display = 'none';
        document.body.appendChild(element);
        element.click();
        document.body.removeChild(element);
    }

    function clearAllData() {
        if (confirm('⚠️ Are you sure? This will delete ALL user data! This action cannot be undone.')) {
            localStorage.removeItem('quizDatabase');
            loadData();
            alert('✓ All data has been cleared!');
        }
    }

    function goHome() {
        window.location.href = 'index.html';
    }

    // Load data when page loads
    window.addEventListener('load', loadData);
</script>

</body>
</html>
